site_name: Faxbot Docs
site_url: https://docs.faxbot.net
repo_url: https://github.com/DMontgomery40/Faxbot
repo_name: DMontgomery40/Faxbot
edit_uri: edit/mkdocs/docs/
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.action.edit
plugins:
  - search
  - mike
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
