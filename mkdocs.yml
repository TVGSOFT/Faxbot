site_name: Faxbot Docs
site_url: https://docs.faxbot.net
repo_url: https://github.com/DMontgomery40/Faxbot
repo_name: DMontgomery40/Faxbot
edit_uri: edit/mkdocs/docs/
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.action.edit
plugins:
  - search
  - mike
  - exclude:
      glob:
        - 'api/admin_ui/node_modules/**'
        - 'api/**/node_modules/**'
        - 'vendor/**'
        - 'node_modules/**'
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - AI Integration: mcp/index.md
  - Backends:
    - Phaxio: go-live/phaxio.md
    - Sinch: go-live/sinch.md
    - SIP/Asterisk: go-live/sip-asterisk.md
  - SDKs: sdks/index.md
  - Deployment: deployment.md
  - API: api.md
